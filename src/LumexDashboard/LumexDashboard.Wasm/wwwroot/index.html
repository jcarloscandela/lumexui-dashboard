<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumexDashboard</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="app.build.css" />
    <link rel="stylesheet" href="LumexDashboard.Wasm.styles.css" />
    <link rel="stylesheet" href="_content/Blazor.Sonner/styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <script>
        (function() {
            const savedTheme = localStorage.getItem('themeMode') || 'light';
            document.documentElement.classList.remove('light', 'dark');
            document.documentElement.classList.add(savedTheme);
        })();
    </script>
</head>

<body class="min-h-screen bg-background">
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_content/LumexUI/js/LumexUI.js" type="module"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
